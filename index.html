<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>मन्त्र जप काउन्टर — विधि चक्र</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#060300;font-family:'Noto Sans Devanagari',serif;overflow-x:hidden;}
body{min-height:100vh;}
input,textarea,button{font-family:'Noto Sans Devanagari',serif;outline:none;}
input[type=range]{width:100%;cursor:pointer;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}

#setup{display:flex;flex-direction:column;align-items:center;padding:32px 18px 120px;}
.card{width:100%;max-width:440px;border-radius:18px;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
.field-label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
.inp{width:100%;border-radius:10px;padding:11px 13px;font-size:16px;border-width:1px;border-style:solid;}
textarea.inp{resize:vertical;line-height:1.75;font-size:18px;}
.preset-btn{border-radius:20px;padding:4px 13px;font-size:12px;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;background:transparent;}
.count-btn{border-radius:20px;padding:8px 18px;font-size:15px;font-weight:600;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;background:transparent;}
.theme-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border-width:2.5px;border-style:solid;transition:all 0.2s;}
.mode-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;margin-bottom:8px;}
.radio-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border-width:2px;border-style:solid;transition:all 0.2s;}
.sz-btn{flex:1;padding:10px 0;border-radius:12px;font-weight:700;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;background:transparent;}
.img-thumb{position:relative;width:68px;height:68px;border-radius:10px;overflow:hidden;border-width:1px;border-style:solid;flex-shrink:0;}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.del-btn{position:absolute;inset:0;background:rgba(0,0,0,0.62);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.2s;font-size:20px;color:#FF6B6B;}
.img-thumb:hover .del-btn{opacity:1;}
.add-btn{width:68px;height:68px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:26px;border-width:1px;border-style:dashed;flex-shrink:0;}
.toggle-track{width:46px;height:26px;border-radius:13px;cursor:pointer;position:relative;transition:all 0.3s;border-width:1px;border-style:solid;flex-shrink:0;}
.toggle-thumb{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;transition:all 0.3s;}
.go-btn{border:none;border-radius:40px;padding:16px;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.3s;width:100%;}
#sticky-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top,#060300 60%,rgba(6,3,0,0.85) 85%,transparent);display:none;justify-content:center;}
#sticky-bar button{width:100%;max-width:440px;border:none;border-radius:40px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:1px;font-family:'Noto Sans Devanagari',serif;}
.upload-zone{border-radius:12px;padding:18px 14px;text-align:center;cursor:pointer;border-width:1px;border-style:dashed;}
.wm-zone{border-radius:10px;text-align:center;cursor:pointer;border-width:1px;border-style:dashed;overflow:hidden;}
.option-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.fx-card{padding:10px 12px;border-radius:12px;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.fx-icon{font-size:18px;width:30px;text-align:center;flex-shrink:0;}
.preset-slot{padding:10px 12px;border-radius:10px;border:1px solid;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;}

/* Counter */
#counter{width:100%;min-height:100vh;position:relative;overflow:hidden;display:none;flex-direction:column;cursor:pointer;user-select:none;}
.bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;pointer-events:none;transition:opacity 0.8s ease;will-change:transform;}
#gradient{position:absolute;inset:0;pointer-events:none;}
#watermark{position:absolute;z-index:10;pointer-events:none;display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(0,0,0,0.42);border-radius:20px;backdrop-filter:blur(8px);border-width:1px;border-style:solid;}
#img-dots{position:absolute;top:14px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:5;pointer-events:none;}
.img-dot{height:5px;border-radius:3px;transition:width 0.4s,background 0.4s;}
#badges{position:absolute;top:14px;right:14px;z-index:11;display:flex;gap:6px;flex-direction:column;align-items:flex-end;}
.badge{display:none;align-items:center;gap:6px;background:rgba(0,0,0,0.5);border-radius:20px;padding:5px 12px;pointer-events:none;}
#rec-ind{position:absolute;top:14px;left:14px;z-index:11;display:none;align-items:center;gap:6px;background:rgba(0,0,0,0.5);border-radius:20px;padding:5px 12px;pointer-events:none;}
#countdown-overlay{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,3,0,0.6);pointer-events:none;}
#cd-num{font-size:130px;font-weight:900;line-height:1;}
#cd-hint{font-size:13px;letter-spacing:3px;margin-top:14px;text-align:center;padding:0 20px;white-space:pre-line;}
#petals{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden;}
.petal{position:absolute;border-radius:50% 50% 50% 0;top:-20px;}
#ui-bottom{position:absolute;bottom:0;left:0;right:0;z-index:5;text-align:center;padding:0 20px 22px;display:flex;flex-direction:column;align-items:center;}
#om-sym{line-height:1;margin-bottom:4px;}
#deity-lbl{font-size:11px;letter-spacing:5px;margin-bottom:6px;text-transform:uppercase;display:none;}
#mantra-wrap{width:100%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;min-height:50px;}
#ring-wrap{display:inline-block;position:relative;}
#ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#counter-num{font-weight:900;line-height:1;}
#counter-denom{font-size:16px;margin-top:2px;}
#counter-jap{font-size:10px;letter-spacing:3px;margin-top:3px;}
#mala-lbl{font-size:14px;letter-spacing:4px;margin-bottom:4px;font-weight:700;display:none;}
#tap-hint{font-size:11px;letter-spacing:3px;margin-top:4px;}
#controls{margin-top:10px;display:none;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
#play-btn{border-radius:30px;padding:9px 26px;font-size:18px;font-weight:700;border-width:1px;border-style:solid;cursor:pointer;background:transparent;}
#reset-btn,#settings-btn,#guide-btn{background:transparent;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;border-width:1px;border-style:solid;}
#rec-btn{background:rgba(255,59,48,0.12);color:#FF6B6B;border:1px solid rgba(255,59,48,0.45);border-radius:30px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;}

/* iPhone record guide modal */
#guide-modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}

@keyframes rec-pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@keyframes ring-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes om-b{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.08) translateY(-5px);}}
@keyframes ctrl-in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes petal-fall{0%{transform:translateY(-10px) rotate(0);opacity:.85;}100%{transform:translateY(108vh) rotate(380deg);opacity:0;}}
@keyframes burst-ring{0%{transform:translate(-50%,-50%) scale(.7);opacity:1;}100%{transform:translate(-50%,-50%) scale(3.2);opacity:0;}}
@keyframes num-pop{0%{transform:scale(1.5);opacity:.3;}65%{transform:scale(.95);}100%{transform:scale(1);opacity:1;}}
@keyframes cd-pop{0%{transform:scale(1.6);opacity:0;}40%{opacity:1;}80%{transform:scale(1);}100%{transform:scale(.85);opacity:0;}}

/* ── KEN BURNS PHOTO EFFECTS ── */
@keyframes kb-zoom-in{0%{transform:scale(1);}100%{transform:scale(1.18);}}
@keyframes kb-zoom-out{0%{transform:scale(1.18);}100%{transform:scale(1);}}
@keyframes kb-pan-lr{0%{transform:scale(1.15) translateX(-3%);}100%{transform:scale(1.15) translateX(3%);}}
@keyframes kb-pan-ud{0%{transform:scale(1.15) translateY(-3%);}100%{transform:scale(1.15) translateY(3%);}}
@keyframes kb-zoom-pan{0%{transform:scale(1) translate(-2%,-1%);}100%{transform:scale(1.2) translate(2%,1%);}}

/* ── TEXT EFFECTS — applied as classes ── */
.tfx-slam{animation:tfx-slam 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes tfx-slam{0%{transform:scale(0.4) translateY(20px);opacity:0;filter:blur(6px);}55%{filter:blur(0);}75%{transform:scale(1.06) translateY(-3px);}100%{transform:scale(1) translateY(0);opacity:1;}}
.tfx-fade{animation:tfx-fade 0.6s ease-out;}
@keyframes tfx-fade{0%{opacity:0;transform:scale(0.96);}100%{opacity:1;transform:scale(1);}}
.tfx-zoom{animation:tfx-zoom 0.55s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes tfx-zoom{0%{transform:scale(0.1);opacity:0;filter:blur(10px);}50%{filter:blur(0);}80%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
.tfx-rise{animation:tfx-rise 0.55s cubic-bezier(0.16,1,0.3,1);}
@keyframes tfx-rise{0%{transform:translateY(70px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.tfx-fall{animation:tfx-fall 0.6s cubic-bezier(0.16,1,0.3,1);}
@keyframes tfx-fall{0%{transform:translateY(-70px);opacity:0;filter:blur(4px);}70%{filter:blur(0);}100%{transform:translateY(0);opacity:1;}}
.tfx-spin{animation:tfx-spin 0.6s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes tfx-spin{0%{transform:rotate(-180deg) scale(0.3);opacity:0;}60%{transform:rotate(10deg) scale(1.1);}100%{transform:rotate(0) scale(1);opacity:1;}}
.tfx-flicker{animation:tfx-flicker 1s ease-in-out;}
@keyframes tfx-flicker{0%,18%,22%,25%,53%,57%,100%{opacity:1;}20%,24%,55%{opacity:0.3;}}
.tfx-shake{animation:tfx-shake 0.7s ease-out;}
@keyframes tfx-shake{0%{transform:scale(0.5);opacity:0;}25%{transform:scale(1) translateX(-9px);opacity:1;}40%{transform:translateX(9px);}55%{transform:translateX(-6px);}70%{transform:translateX(6px);}85%{transform:translateX(-3px);}100%{transform:translateX(0);}}
.tfx-divine{animation:tfx-divine 0.8s ease-out;}
@keyframes tfx-divine{0%{transform:scale(0.7);opacity:0;filter:brightness(2.5) blur(8px);}40%{filter:brightness(1.6) blur(0);}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;filter:brightness(1);}}
.tfx-bounce{animation:tfx-bounce 0.7s cubic-bezier(0.28,0.84,0.42,1);}
@keyframes tfx-bounce{0%{transform:translateY(-90px);opacity:0;}50%{opacity:1;}65%{transform:translateY(8px);}80%{transform:translateY(-4px);}100%{transform:translateY(0);}}

@keyframes glow-loop{0%,100%{text-shadow:0 0 18px var(--fxg),0 0 45px var(--fxg);}50%{text-shadow:0 0 36px var(--fxg),0 0 90px var(--fxg);}}
</style>
</head>
<body>

<div id="setup"></div>
<div id="sticky-bar"><button id="sticky-go" onclick="startCounter()">▶ START</button></div>

<div id="counter">
  <img id="bg-img-a" class="bg-img" alt="" style="opacity:0"/>
  <img id="bg-img-b" class="bg-img" alt="" style="opacity:0"/>
  <div id="gradient"></div>
  <div id="watermark"></div>
  <div id="img-dots"></div>
  <div id="rec-ind"><div style="width:8px;height:8px;border-radius:50%;background:#FF3B30;animation:rec-pulse 1.2s ease-in-out infinite;"></div><span style="color:rgba(255,255,255,0.8);font-size:11px;font-family:monospace;letter-spacing:1px;">REC</span></div>
  <div id="badges">
    <div class="badge" id="audio-badge"><span style="font-size:11px;">🎵</span><span style="color:rgba(255,255,255,0.8);font-size:11px;font-family:monospace;letter-spacing:1px;">AUDIO SYNC</span></div>
  </div>
  <div id="countdown-overlay"><div id="cd-num"></div><div id="cd-hint"></div></div>
  <div id="petals"></div>
  <div id="ui-bottom">
    <div id="om-sym">ॐ</div>
    <div id="deity-lbl"></div>
    <div id="mantra-wrap"></div>
    <div id="ring-wrap" style="display:none;">
      <svg id="ring-svg" style="overflow:visible;"></svg>
      <div id="ring-center">
        <div id="counter-num"></div>
        <div id="counter-denom"></div>
        <div id="counter-jap"></div>
      </div>
    </div>
    <div id="mala-lbl"></div>
    <div id="tap-hint"></div>
    <div id="controls">
      <div id="play-btn">▶</div>
      <button id="reset-btn" onclick="resetCounter(event)">↺</button>
      <button id="guide-btn" onclick="showGuide(event)">?</button>
      <button id="settings-btn" onclick="goBack(event)">⚙</button>
    </div>
  </div>
</div>

<!-- iPhone record guide -->
<div id="guide-modal" onclick="hideGuide()"></div>

<audio id="bhajan-audio" loop style="display:none;"></audio>

};

// ── Syllable-based estimate (Devanagari vowels/matras ≈ syllables) ──
function estimateMantraSeconds(m){
  if(!m)return 5;
  // Count Devanagari consonants + independent vowels as rough syllable count
  const chars=[...m.replace(/\s/g,'')];
  // Devanagari consonant range 0x0915-0x0939, independent vowels 0x0905-0x0914
  let syll=0;
  for(const ch of chars){
    const c=ch.codePointAt(0);
    if((c>=0x0915&&c<=0x0939)||(c>=0x0905&&c<=0x0914))syll++;
  }
  if(syll===0)syll=m.split(/\s+/).length*2;
  // ~0.55s per syllable chanted at devotional pace, min 2s
  return Math.max(2,Math.min(15,Math.round(syll*0.55)));
}

// ── Audio: detect duration on upload, set timer to match ──
function handleAudioFile(inp){
  const f=inp.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  sAudioSrc=url;sAudioName=f.name;
  const audio=el('bhajan-audio');
  audio.src=url;
  audio.addEventListener('loadedmetadata',function once(){
    sAudioDuration=audio.duration||0;
    if(sAudioDuration>0&&sAudioDuration<60){
      // The clip length IS the jap duration
      sSpeed=Math.max(1,Math.min(30,Math.round(sAudioDuration*10)/10));
    }
    renderSetup();
    audio.removeEventListener('loadedmetadata',once);
  },{once:true});
  renderSetup();
}
function clearAudio(){
  if(sAudioSrc&&sAudioSrc.startsWith('blob:'))URL.revokeObjectURL(sAudioSrc);
  sAudioSrc=null;sAudioName="";sAudioDuration=0;
  el('bhajan-audio').src='';
  renderSetup();
}

      <label class="field-label" style="color:${PL}">${L.japSpeed} — <span id="speed-lbl" style="color:${P}">${sSpeed}s per jap</span> ${sAudioSrc?`<span style="background:${gC(P,0.1)};color:${P};padding:2px 6px;border-radius:8px;font-size:9px;margin-left:6px">🎵 AUDIO</span>`:''}</label>
      <input type="range" min="1" max="20" step="0.5" value="${sSpeed}" oninput="sSpeed=+this.value;el('speed-lbl').textContent=sSpeed+'s per jap'" style="accent-color:${P}" ${sAudioSrc?'disabled':''}/>
      <div style="display:flex;justify-content:space-between;color:${PM};font-size:11px;margin-top:4px"><span>⚡1s</span><span>🕉20s</span></div>
      ${!sAudioSrc&&sMantra.trim()?`<button onclick="sSpeed=${estSec};renderSetup()" style="width:100%;margin-top:10px;padding:11px;background:${gC(P,0.1)};border:1px solid ${gC(P,0.35)};border-radius:10px;color:${P};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
        🧠 ${L.smartDetect}: set to ${estSec}s <span style="color:${gC(P,0.5)};font-weight:400">(from mantra length)</span>
      </button>`:''}
    </div>

    <!-- AUTO -->
    <div class="option-row">
      <div><div style="color:${gC(P,0.5)};font-size:10px;letter-spacing:3px">${L.autoStart}</div><div style="color:${gC(P,0.25)};font-size:11px;margin-top:3px">${L.autoHint}</div></div>
      <div class="toggle-track" style="background:${sAuto?gC(P,0.3):gC(P,0.08)};border:1px solid ${sAuto?gC(P,0.6):gC(P,0.2)}" onclick="sAuto=!sAuto;renderSetup()"><div class="toggle-thumb" style="left:${sAuto?23:3}px;background:${sAuto?P:'rgba(255,255,255,0.2)'};box-shadow:${sAuto?`0 0 8px ${gC(P,0.8)}`:'none'}"></div></div>
    </div>

    <!-- iPhone RECORD GUIDE -->
    <div style="background:${gC(P,0.06)};border:1px solid ${gC(P,0.18)};border-radius:12px;padding:14px">
      <div style="color:${P};font-size:13px;font-weight:700;margin-bottom:6px">📱 How to Save MP4 (iPhone)</div>
      <div style="color:${gC(P,0.55)};font-size:12px;line-height:1.6">1. Tap <strong style="color:${P}">▶ START</strong> below to preview<br/>2. Start your iPhone <strong style="color:${P}">Screen Record</strong> (Control Centre)<br/>3. Let it run — audio is captured automatically<br/>4. Stop → MP4 in Photos → post!</div>
      <div style="color:${gC(P,0.4)};font-size:11px;margin-top:8px">On the counter screen, tap <strong style="color:${gC(P,0.6)}">?</strong> for full steps.</div>
    </div>

    <div style="display:flex;gap:10px">
      <button onclick="savePreset()" ${!sMantra.trim()?'disabled':''} style="flex:1;background:transparent;color:${sMantra.trim()?P:gC(P,0.2)};border:1px solid ${sMantra.trim()?gC(P,0.4):gC(P,0.1)};border-radius:40px;padding:14px;font-size:14px;font-weight:700;cursor:${sMantra.trim()?'pointer':'not-allowed'};font-family:inherit;letter-spacing:1px">💾 ${L.save}</button>
    </div>

    <button class="go-btn" onclick="startCounter()" style="background:${sMantra.trim()?`linear-gradient(135deg,${dC(P)},${P},${dC(P)})`:'rgba(255,255,255,0.06)'};color:${sMantra.trim()?'#0d0800':'rgba(255,255,255,0.2)'};cursor:${sMantra.trim()?'pointer':'not-allowed'};box-shadow:${sMantra.trim()?`0 0 40px ${gC(P,0.3)}`:'none'}">${sMantra.trim()?'▶ '+L.start:L.enterMantra}</button>
  </div>`;

  const sb=el('sticky-bar'),sbtn=el('sticky-go');
  sb.style.display='flex';
  sbtn.textContent=sMantra.trim()?'▶ '+L.start:L.enterMantra;
  sbtn.style.background=sMantra.trim()?`linear-gradient(135deg,${dC(P)},${P},${dC(P)})`:'rgba(120,120,120,0.5)';
  sbtn.style.color=sMantra.trim()?'#0d0800':'rgba(255,255,255,0.5)';
  sbtn.style.cursor=sMantra.trim()?'pointer':'not-allowed';
  sbtn.style.boxShadow=sMantra.trim()?`0 0 30px ${gC(P,0.4)}`:'none';
}

function setLang(l){sLang=l;renderSetup();}
function setTheme(id){sThemeId=id;renderSetup();}
function setCustomClr(v){sCustomClr=v;renderSetup();}
function setTextMode(m){sTextMode=m;renderSetup();}
function setTextFx(f){sTextFx=f;renderSetup();}
function setFontSize(s){sFontSize=s;renderSetup();}
function setCount(n){sCount=n;sCustom='';renderSetup();}
function setPresetByIndex(i){const p=PRESETS[i];if(!p)return;sMantra=p.mantra;const ta=el('inp-mantra');if(ta)ta.value=p.mantra;renderSetup();}
function updateGoBtn(){sMantra=el('inp-mantra').value;renderSetup();}
async function addImages(inp){const files=Array.from(inp.files);const r=await Promise.all(files.map(b64));sImages=[...sImages,...r];renderSetup();}
function removeImg(i){sImages=sImages.filter((_,j)=>j!==i);renderSetup();}
async function setLogo(inp){if(inp.files[0]){sLogoSrc=await b64(inp.files[0]);renderSetup();}}

function startCounter(){
  if(!sMantra.trim())return;
  sDeity=el('inp-deity')?.value||sDeity;
  sMantra=el('inp-mantra')?.value||sMantra;
  cRunning=false;cN=0;cMalas=0;cImgIdx=0;cCountdown=null;
  cWords=sMantra.trim().split(/\s+/).filter(Boolean);
  cWordIdx=0;cShown=1;
  clearAllTimers();
  el('setup').style.display='none';
  el('sticky-bar').style.display='none';
  el('counter').style.display='flex';
  applyTheme();
  renderMantraText(false);
  drawRing(0,totalN());
  el('counter-num').textContent=0;
  el('counter-denom').textContent='/ '+totalN();
  el('mala-lbl').style.display='none';
  el('ring-wrap').style.display=sShowCounter?'inline-block':'none';
  startImgCycle();
  if(sAuto)setRunning(true);else showControls();
}

function applyTheme(){
  const t=theme(),P=t.p,S=t.s,L=lang(),f=fs();
  el('counter').style.setProperty('--fxg',gC(P,0.8));
  el('om-sym').style.cssText=`font-size:${sShowCounter?40:56}px;color:${P};line-height:1;margin-bottom:4px;animation:om-b 4s ease-in-out infinite;filter:drop-shadow(0 0 16px ${gC(P,0.8)});`;
  if(sDeity){el('deity-lbl').style.display='block';el('deity-lbl').textContent=sDeity;el('deity-lbl').style.color=gC(P,0.6);}else el('deity-lbl').style.display='none';
  el('ring-wrap').style.animation='ring-float 3.5s ease-in-out infinite';
  el('counter-num').style.cssText=`font-weight:900;line-height:1;font-size:${f.counter}px;color:${P};text-shadow:0 0 28px ${gC(P,0.95)},0 0 60px ${gC(P,0.45)},0 2px 12px rgba(0,0,0,0.95);`;
  el('counter-denom').style.color=gC(P,0.55);
  el('counter-jap').style.color=gC(P,0.3);el('counter-jap').textContent=L.jap;
  el('mala-lbl').style.color=S;el('mala-lbl').style.textShadow=`0 0 14px ${gC(S,0.7)}`;
  el('tap-hint').style.color=gC(P,0.28);el('tap-hint').textContent=L.tapHint;
  el('play-btn').style.borderColor=gC(P,0.4);
  el('reset-btn').style.cssText+=`;border:1px solid ${gC(P,0.22)};color:${gC(P,0.45)};`;
  el('guide-btn').style.cssText+=`;border:1px solid ${gC(P,0.22)};color:${gC(P,0.45)};`;
  el('settings-btn').style.cssText+=`;border:1px solid ${gC(P,0.14)};color:${gC(P,0.3)};`;
  el('gradient').style.background=sImages.length?'linear-gradient(to bottom,rgba(6,3,0,0.05) 0%,rgba(6,3,0,0.06) 40%,rgba(6,3,0,0.7) 62%,rgba(6,3,0,0.97) 100%)':'linear-gradient(to bottom,rgba(6,3,0,0.8) 0%,rgba(6,3,0,0.85) 100%)';
  el('mantra-wrap').style.marginBottom=sShowCounter?'14px':'24px';
  el('mantra-wrap').style.marginTop=sShowCounter?'0':'10px';
  renderWatermark(P);renderImgDots();
  // First image + ken burns
  const kb=photoFxAnim();
  if(sImages.length>0){
    imgSlotA=true;
    const a=el('bg-img-a');
    a.src=sImages[0];a.style.opacity='0.85';
    a.style.animation=kb?`${kb} ${Math.max(8,sImgInt*1.5)}s ease-in-out infinite alternate`:'';
    el('bg-img-b').style.opacity='0';
  }else{el('bg-img-a').style.opacity='0';el('bg-img-b').style.opacity='0';}
  el('audio-badge').style.display=sAudioSrc?'flex':'none';
}

function renderWatermark(P){
  const wm=el('watermark');
  const posMap={tl:{top:'14px',left:'14px'},tr:{top:'50px',right:'14px'},bl:{bottom:'85px',left:'14px'},br:{bottom:'85px',right:'14px'}};
  const pos=posMap[sWmPos]||posMap.tr;
  wm.style.cssText=`position:absolute;z-index:10;pointer-events:none;display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(0,0,0,0.42);border-radius:20px;backdrop-filter:blur(8px);border:1px solid ${gC(P,0.3)};${Object.entries(pos).map(([k,v])=>k+':'+v).join(';')}`;
  wm.innerHTML=sLogoSrc?`<img src="${sLogoSrc}" style="height:26px;width:auto;max-width:90px;object-fit:contain"/>`:`<span style="font-size:14px">🔯</span><div style="line-height:1"><div style="color:${P};font-size:11px;font-weight:700;letter-spacing:1px;font-family:inherit">विधि चक्र</div><div style="color:${gC(P,0.55)};font-size:8px;letter-spacing:2px;font-family:monospace">VIDHI CHAKRA</div></div>`;
}

function renderImgDots(){
  const P=theme().p,dots=el('img-dots');dots.innerHTML='';
  if(sImages.length>1)sImages.forEach((_,i)=>{const d=document.createElement('div');d.className='img-dot';d.style.width=(i===cImgIdx?20:6)+'px';d.style.background=i===cImgIdx?P:gC(P,0.3);dots.appendChild(d);});
}

function startImgCycle(){
  clearInterval(imgTimerA);
  if(sImages.length<=1)return;
  const kb=photoFxAnim();
  imgTimerA=setInterval(()=>{
    const nextIdx=(cImgIdx+1)%sImages.length;
    const showEl=imgSlotA?el('bg-img-b'):el('bg-img-a');
    const hideEl=imgSlotA?el('bg-img-a'):el('bg-img-b');
    showEl.src=sImages[nextIdx];
    showEl.style.animation=kb?`${kb} ${Math.max(8,sImgInt*1.5)}s ease-in-out infinite alternate`:'';
    showEl.style.opacity='0.85';
    setTimeout(()=>hideEl.style.opacity='0',50);
    imgSlotA=!imgSlotA;cImgIdx=nextIdx;renderImgDots();
  },sImgInt*1000);
}

// ── TEXT — fixed: use classList to force reflow & re-trigger ──
function renderMantraText(animate){
  const P=theme().p,f=fs(),wrap=el('mantra-wrap'),fx=fxConfig();
  wrap.style.setProperty('--fxg',gC(P,0.9));
  const shadow=`0 2px 16px rgba(0,0,0,0.95),0 0 30px ${gC(P,0.35)}`;
  let html='';
  if(sTextMode==='full'){
    html=`<div class="mtxt ${animate?fx.cls:''}" style="font-size:${f.mantra}px;color:${P};line-height:1.6;letter-spacing:1px;font-weight:800;text-align:center;padding:0 10px;text-shadow:${shadow};--fxg:${gC(P,0.7)};${!animate?'animation:glow-loop 3s ease-in-out infinite':''}">${sMantra}</div>`;
  } else if(sTextMode==='word'){
    const w=cWords[cWordIdx]||cWords[0]||'';
    const wLen=w.length;
    const sz=wLen>6?f.mantra*1.2:wLen>4?f.mantra*1.35:f.mantra*1.55;
    html=`<div class="mtxt ${animate?fx.cls:''}" style="font-size:${sz}px;font-weight:900;color:${P};line-height:1.2;letter-spacing:2px;text-shadow:0 0 40px ${gC(P,0.9)},0 0 80px ${gC(P,0.5)},0 3px 20px rgba(0,0,0,0.95);text-align:center;width:100%;padding:0 10px;word-break:break-word;--fxg:${gC(P,0.9)}">${w}</div>`;
  } else {
    const visible=cWords.slice(0,cShown);
    const baseSz=cWords.length>6?f.mantra*0.85:f.mantra;
    html=`<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%;padding:0 10px">`+visible.map((w,i)=>{
      const isNew=i===cShown-1;
      return `<span class="${isNew&&animate?fx.cls:''}" style="font-size:${isNew?baseSz*1.35:baseSz*0.9}px;font-weight:${isNew?900:700};color:${isNew?P:gC(P,0.42)};letter-spacing:1px;text-shadow:${isNew?`0 0 35px ${gC(P,0.9)},0 0 70px ${gC(P,0.5)},0 3px 18px rgba(0,0,0,0.95)`:`0 2px 10px rgba(0,0,0,0.8)`};transition:all 0.35s;--fxg:${gC(P,0.9)}">${w}</span>`;
    }).join('')+'</div>';
  }
  wrap.innerHTML=html;
  // Force reflow so the animation class actually fires each time
  if(animate){void wrap.offsetHeight;}
}

function drawRing(current,total){
  const P=theme().p,S=theme().s;
  const R=78,ORB=106,DS=5.5,SZ=(ORB+DS+10)*2,C=SZ/2;
  const circ=2*Math.PI*R,off=circ-(current/total)*circ;
  const rsvg=el('ring-svg');
  rsvg.setAttribute('width',SZ);rsvg.setAttribute('height',SZ);rsvg.setAttribute('viewBox',`0 0 ${SZ} ${SZ}`);
  const dots=[...Array(total)].map((_,i)=>{const a=((i/total)*360-90)*(Math.PI/180),lit=i<current;return `<circle cx="${C+ORB*Math.cos(a)}" cy="${C+ORB*Math.sin(a)}" r="${lit?DS:DS*0.48}" fill="${lit?P:gC(P,0.22)}" ${lit?'filter="url(#dg)"':''} style="transition:r 0.3s,fill 0.3s"/>`;}).join('');
  rsvg.innerHTML=`<defs><linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${P}"/><stop offset="50%" stop-color="${S}"/><stop offset="100%" stop-color="${P}"/></linearGradient><filter id="ag" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="dg" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="${gC(P,0.18)}" stroke-width="10"/><circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="url(#rG)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 ${C} ${C})" filter="url(#ag)" style="transition:stroke-dashoffset 0.55s cubic-bezier(0.4,0,0.2,1)"/>${dots}`;
  el('ring-center').style.cssText=`position:absolute;inset:0;width:${SZ}px;height:${SZ}px;display:flex;flex-direction:column;align-items:center;justify-content:center;`;
}

function tickJap(){
  cN++;
  if(cN>=totalN()){cN=0;cMalas++;spawnBurst();}
  const num=el('counter-num');
  num.style.animation='none';void num.offsetHeight;num.style.animation='num-pop 0.42s cubic-bezier(0.34,1.56,0.64,1)';
  num.textContent=cN;el('counter-denom').textContent='/ '+totalN();
  if(cMalas>0){el('mala-lbl').style.display='block';el('mala-lbl').textContent=lang().mala+' × '+cMalas+' ✦';}
  if(sShowCounter)drawRing(cN,totalN());
  cWordIdx=0;cShown=1;renderMantraText(true);
}

function setRunning(val){
  cRunning=val;
  clearInterval(japTimer);clearInterval(wordTimer);clearInterval(buildTimer);
  const audio=el('bhajan-audio');
  if(val){
    // Audio loops continuously; jap timer matches audio clip length (or slider)
    if(sAudioSrc){audio.currentTime=0;audio.play().catch(()=>{});}
    const japMs=sSpeed*1000;
    japTimer=setInterval(tickJap,japMs);
    if(sTextMode==='word'&&cWords.length>0){
      const iv=Math.max(250,japMs/cWords.length);
      wordTimer=setInterval(()=>{cWordIdx=(cWordIdx+1)%cWords.length;renderMantraText(true);},iv);
    }
    if(sTextMode==='build'&&cWords.length>0){
      const iv=Math.max(250,japMs/(cWords.length+1));
      buildTimer=setInterval(()=>{cShown=cShown>=cWords.length?1:cShown+1;renderMantraText(true);},iv);
    }
    spawnPetals();el('tap-hint').style.display='none';
  }else{
    audio.pause();stopPetals();
  }
  updatePlayBtn();
}

function updatePlayBtn(){
  const P=theme().p,S=theme().s,btn=el('play-btn');
  btn.textContent=cRunning?'⏸':'▶';
  btn.style.background=cRunning?gC(S,0.14):gC(P,0.14);
  btn.style.borderColor=cRunning?gC(S,0.4):gC(P,0.4);
  btn.style.color=cRunning?S:P;
}

el('counter').addEventListener('click',()=>{if(cCountdown!==null)return;setRunning(!cRunning);showControls();});
el('play-btn').addEventListener('click',e=>{e.stopPropagation();setRunning(!cRunning);showControls();});

function showControls(){el('controls').style.display='flex';el('controls').style.animation='ctrl-in 0.3s ease-out';el('tap-hint').style.display='none';clearTimeout(ctrlTimer);ctrlTimer=setTimeout(hideControls,4500);}
function hideControls(){el('controls').style.display='none';if(!cRunning)el('tap-hint').style.display='block';}

function resetCounter(e){
  e.stopPropagation();clearAllTimers();cN=0;cMalas=0;cWordIdx=0;cShown=1;
  el('bhajan-audio').currentTime=0;setRunning(false);
  const n=totalN();if(sShowCounter)drawRing(0,n);
  el('counter-num').textContent=0;el('counter-denom').textContent='/ '+n;el('mala-lbl').style.display='none';
  renderMantraText(false);showControls();
}

function goBack(e){e.stopPropagation();clearAllTimers();setRunning(false);el('counter').style.display='none';el('setup').style.display='flex';renderSetup();}

let petalIv=null,petalEls=[];
function spawnPetals(){
  stopPetals();const P=theme().p,S=theme().s;
  const colors=[`rgba(255,80,80,0.62)`,`rgba(255,165,0,0.6)`,gC(P,0.55),gC(S,0.5)];
  petalIv=setInterval(()=>{const p=document.createElement('div');p.className='petal';const i=Math.floor(Math.random()*7),w=7+(i%3)*2,h=12+(i%3)*3;p.style.cssText=`width:${w}px;height:${h}px;left:${Math.random()*90+5}%;background:${colors[i%4]};animation:petal-fall ${2.6+i*0.65}s linear forwards`;el('petals').appendChild(p);petalEls.push(p);setTimeout(()=>{p.remove();petalEls=petalEls.filter(x=>x!==p);},(2.6+i*0.65)*1000+100);},700);
}
function stopPetals(){clearInterval(petalIv);petalEls.forEach(p=>p.remove());petalEls=[];}

function spawnBurst(){const P=theme().p,d=document.createElement('div');d.style.cssText=`position:absolute;top:50%;left:50%;width:280px;height:280px;border-radius:50%;border:2.5px solid ${P};box-shadow:0 0 30px ${gC(P,0.7)};animation:burst-ring 0.8s ease-out forwards;pointer-events:none;z-index:6`;el('counter').appendChild(d);setTimeout(()=>d.remove(),900);}

function clearAllTimers(){clearInterval(japTimer);clearInterval(imgTimerA);clearInterval(wordTimer);clearInterval(buildTimer);clearInterval(cdTimer);clearTimeout(ctrlTimer);japTimer=imgTimerA=wordTimer=buildTimer=cdTimer=null;}

renderSetup();
</script>
</body>
</html>
