<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>मन्त्र जप काउन्टर — विधि चक्र</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060300;font-family:'Noto Sans Devanagari',serif;overflow-x:hidden;}
input,textarea,button{font-family:'Noto Sans Devanagari',serif;outline:none;}
input[type=range]{width:100%;cursor:pointer;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}

#setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 18px 70px;overflow-y:auto;}
.card{width:100%;max-width:440px;border-radius:18px;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
.field-label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
.inp{width:100%;border-radius:10px;padding:11px 13px;font-size:16px;border-width:1px;border-style:solid;}
textarea.inp{resize:vertical;line-height:1.75;font-size:18px;}
.preset-btn{border-radius:20px;padding:4px 13px;font-size:12px;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;background:transparent;}
.count-btn{border-radius:20px;padding:8px 18px;font-size:15px;font-weight:600;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;background:transparent;}
.theme-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border-width:2.5px;border-style:solid;transition:all 0.2s;}
.mode-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;margin-bottom:8px;}
.radio-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border-width:2px;border-style:solid;transition:all 0.2s;}
.sz-btn{flex:1;padding:10px 0;border-radius:12px;font-weight:700;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;background:transparent;}
.img-thumb{position:relative;width:68px;height:68px;border-radius:10px;overflow:hidden;border-width:1px;border-style:solid;flex-shrink:0;}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.del-btn{position:absolute;inset:0;background:rgba(0,0,0,0.62);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.2s;font-size:20px;color:#FF6B6B;}
.img-thumb:hover .del-btn{opacity:1;}
.add-btn{width:68px;height:68px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:26px;border-width:1px;border-style:dashed;flex-shrink:0;}
.toggle-track{width:46px;height:26px;border-radius:13px;cursor:pointer;position:relative;transition:all 0.3s;border-width:1px;border-style:solid;flex-shrink:0;}
.toggle-thumb{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;transition:all 0.3s;}
.go-btn{border:none;border-radius:40px;padding:16px;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.3s;width:100%;}
.upload-zone{border-radius:12px;padding:18px 14px;text-align:center;cursor:pointer;border-width:1px;border-style:dashed;}
.wm-zone{border-radius:10px;text-align:center;cursor:pointer;border-width:1px;border-style:dashed;overflow:hidden;}
.option-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.fx-card{padding:10px 12px;border-radius:12px;cursor:pointer;border-width:1px;border-style:solid;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.fx-icon{font-size:18px;width:30px;text-align:center;flex-shrink:0;}
.tab-btn{flex:1;padding:10px;text-align:center;font-size:11px;letter-spacing:1.5px;font-weight:600;cursor:pointer;border:none;background:transparent;text-transform:uppercase;border-bottom:2px solid transparent;}
.preset-slot{padding:10px 12px;border-radius:10px;border:1px solid;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;}

/* Counter */
#counter{width:100%;min-height:100vh;position:relative;overflow:hidden;display:none;flex-direction:column;cursor:pointer;user-select:none;}
#bg-img-a,#bg-img-b{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;pointer-events:none;transition:opacity 0.8s ease;}
#gradient{position:absolute;inset:0;pointer-events:none;}
#watermark{position:absolute;z-index:10;pointer-events:none;display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(0,0,0,0.42);border-radius:20px;backdrop-filter:blur(8px);border-width:1px;border-style:solid;}
#img-dots{position:absolute;top:14px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:5;pointer-events:none;}
.img-dot{height:5px;border-radius:3px;transition:width 0.4s,background 0.4s;}
#rec-ind{position:absolute;top:14px;left:14px;z-index:11;display:none;align-items:center;gap:6px;background:rgba(0,0,0,0.5);border-radius:20px;padding:5px 12px;pointer-events:none;}
#audio-ind{position:absolute;top:14px;right:14px;z-index:11;display:none;align-items:center;gap:6px;background:rgba(0,0,0,0.5);border-radius:20px;padding:5px 12px;pointer-events:none;}
#countdown-overlay{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,3,0,0.6);pointer-events:none;}
#cd-num{font-size:130px;font-weight:900;line-height:1;}
#cd-hint{font-size:13px;letter-spacing:3px;margin-top:14px;text-align:center;padding:0 20px;white-space:pre-line;}
#petals{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden;}
.petal{position:absolute;border-radius:50% 50% 50% 0;top:-20px;}
#ui-bottom{position:absolute;bottom:0;left:0;right:0;z-index:5;text-align:center;padding:0 20px 22px;display:flex;flex-direction:column;align-items:center;}
#om-sym{line-height:1;margin-bottom:4px;}
#deity-lbl{font-size:11px;letter-spacing:5px;margin-bottom:6px;text-transform:uppercase;display:none;}
#mantra-wrap{width:100%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;}
#ring-wrap{display:inline-block;position:relative;}
#ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#counter-num{font-weight:900;line-height:1;}
#counter-denom{font-size:16px;margin-top:2px;}
#counter-jap{font-size:10px;letter-spacing:3px;margin-top:3px;}
#mala-lbl{font-size:14px;letter-spacing:4px;margin-bottom:4px;font-weight:700;display:none;}
#tap-hint{font-size:11px;letter-spacing:3px;margin-top:4px;}
#controls{margin-top:10px;display:none;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
#play-btn{border-radius:30px;padding:9px 26px;font-size:18px;font-weight:700;border-width:1px;border-style:solid;cursor:pointer;background:transparent;}
#reset-btn,#settings-btn{background:transparent;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;border-width:1px;border-style:solid;}
#rec-btn{background:rgba(255,59,48,0.12);color:#FF6B6B;border:1px solid rgba(255,59,48,0.45);border-radius:30px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;}
#rec-banner{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:15;display:none;align-items:center;gap:10px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,59,48,0.6);border-radius:30px;padding:10px 20px;pointer-events:auto;cursor:pointer;}
#preview-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;padding:20px;}

@keyframes rec-pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@keyframes ring-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes om-b{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.08) translateY(-5px);}}
@keyframes ctrl-in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes petal-fall{0%{transform:translateY(-10px) rotate(0);opacity:.85;}100%{transform:translateY(108vh) rotate(380deg);opacity:0;}}
@keyframes burst-ring{0%{transform:translate(-50%,-50%) scale(.7);opacity:1;}100%{transform:translate(-50%,-50%) scale(3.2);opacity:0;}}
@keyframes num-pop{0%{transform:scale(1.5);opacity:.3;}65%{transform:scale(.95);}100%{transform:scale(1);opacity:1;}}
@keyframes cd-pop{0%{transform:scale(1.6);opacity:0;}40%{opacity:1;}80%{transform:scale(1);}100%{transform:scale(.85);opacity:0;}}
@keyframes tap-flash{0%{transform:scale(1);}50%{transform:scale(1.15);}100%{transform:scale(1);}}

/* TEXT EFFECTS */
@keyframes fx-slam{0%{transform:scale(0.4) translateY(20px);opacity:0;filter:blur(6px);}55%{filter:blur(0);}75%{transform:scale(1.06) translateY(-3px);}100%{transform:scale(1) translateY(0);opacity:1;}}
@keyframes fx-fade{0%{opacity:0;transform:scale(0.96);}100%{opacity:1;transform:scale(1);}}
@keyframes fx-zoom{0%{transform:scale(0.1);opacity:0;filter:blur(10px);}50%{filter:blur(0);}80%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
@keyframes fx-slide-up{0%{transform:translateY(80px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
@keyframes fx-slide-down{0%{transform:translateY(-80px);opacity:0;filter:blur(4px);}70%{filter:blur(0);}100%{transform:translateY(0);opacity:1;}}
@keyframes fx-spin{0%{transform:rotate(-180deg) scale(0.3);opacity:0;}60%{transform:rotate(10deg) scale(1.1);}100%{transform:rotate(0) scale(1);opacity:1;}}
@keyframes fx-flicker{0%,18%,22%,25%,53%,57%,100%{opacity:1;text-shadow:0 0 4px currentColor,0 0 11px currentColor,0 0 19px currentColor,0 0 40px var(--fx-glow);}20%,24%,55%{opacity:0.4;text-shadow:none;}}
@keyframes fx-shake{0%{transform:scale(0.5);opacity:0;}30%{transform:scale(1) translateX(-8px);opacity:1;}40%{transform:scale(1) translateX(8px);}50%{transform:scale(1) translateX(-6px);}60%{transform:scale(1) translateX(6px);}70%{transform:scale(1) translateX(-3px);}100%{transform:scale(1) translateX(0);}}
@keyframes fx-divine{0%{transform:scale(0.7);opacity:0;filter:brightness(2) blur(6px);}40%{filter:brightness(1.5) blur(0);}70%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;filter:brightness(1);}}
@keyframes fx-divine-aura{0%,100%{text-shadow:0 0 20px var(--fx-glow),0 0 40px var(--fx-glow),0 0 60px var(--fx-glow);}50%{text-shadow:0 0 40px var(--fx-glow),0 0 80px var(--fx-glow),0 0 120px var(--fx-glow);}}
@keyframes fx-build-new{0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
@keyframes fx-full-pop{0%{transform:scale(0.9);opacity:.3;}60%{transform:scale(1.03);}100%{transform:scale(1);opacity:1;}}
@keyframes glow-loop{0%,100%{text-shadow:0 0 18px var(--fx-glow),0 0 45px var(--fx-glow);}50%{text-shadow:0 0 36px var(--fx-glow),0 0 90px var(--fx-glow);}}
</style>
</head>
<body>

<div id="setup"></div>

<div id="counter">
  <img id="bg-img-a" alt="" style="opacity:0"/>
  <img id="bg-img-b" alt="" style="opacity:0"/>
  <div id="gradient"></div>
  <div id="watermark"></div>
  <div id="img-dots"></div>
  <div id="rec-ind">
    <div style="width:8px;height:8px;border-radius:50%;background:#FF3B30;animation:rec-pulse 1.2s ease-in-out infinite;"></div>
    <span style="color:rgba(255,255,255,0.8);font-size:11px;font-family:monospace;letter-spacing:1px;">REC</span>
  </div>
  <div id="audio-ind">
    <span style="font-size:11px;">🎵</span>
    <span style="color:rgba(255,255,255,0.8);font-size:11px;font-family:monospace;letter-spacing:1px;">SYNCED</span>
  </div>
  <div id="countdown-overlay"><div id="cd-num"></div><div id="cd-hint"></div></div>
  <div id="petals"></div>
  <div id="rec-banner" onclick="stopBuiltInRec()">
    <div style="width:10px;height:10px;border-radius:50%;background:#FF3B30;animation:rec-pulse 1.2s ease-in-out infinite;flex-shrink:0;"></div>
    <span style="color:#FF6B6B;font-size:13px;font-weight:700;letter-spacing:1px;">RECORDING — tap to stop & download</span>
  </div>
  <div id="ui-bottom">
    <div id="om-sym">ॐ</div>
    <div id="deity-lbl"></div>
    <div id="mantra-wrap"></div>
    <div id="ring-wrap" style="display:none;">
      <svg id="ring-svg" style="overflow:visible;"></svg>
      <div id="ring-center">
        <div id="counter-num"></div>
        <div id="counter-denom"></div>
        <div id="counter-jap"></div>
      </div>
    </div>
    <div id="mala-lbl"></div>
    <div id="tap-hint"></div>
    <div id="controls">
      <div id="play-btn">▶</div>
      <button id="reset-btn" onclick="resetCounter(event)">↺</button>
      <button id="rec-btn" onclick="startBuiltInRec(event)">⏺ REC</button>
      <button id="settings-btn" onclick="goBack(event)">⚙</button>
    </div>
  </div>
</div>

<audio id="bhajan-audio" style="display:none;"></audio>

<script>
const THEMES=[
  {id:"gold",label:"Gold",p:"#FFD700",s:"#FF8C00"},

  {id:"rose",label:"Rose",p:"#FF6EB4",s:"#FF1493"},

  {id:"shake",icon:"🔱",label:"Tandav",desc:"Shiva's earthquake",css:"fx-shake 0.7s ease-out",okBuild:false},
  {id:"type",icon:"⌨️",label:"Typewriter",desc:"Reveals letter by letter",css:"fx-fade 0.5s ease-out",okBuild:true},

  {label:"राम",mantra:"ॐ श्री राम जय राम जय जय राम"},

  {label:"हनुमान",mantra:"ॐ हं हनुमते नमः"},
];
const WM_POS=[{id:"tl",label:"↖"},{id:"tr",label:"↗"},{id:"bl",label:"↙"},{id:"br",label:"↘"}];
const STR={
  ne:{title:"मन्त्र जप काउन्टर",sub:"सनातन धर्म टक",deity:"देवता",deityPh:"जस्तै: श्री गणेश...",mantra:"मन्त्र",mantraPh:"मन्त्र यहाँ टाइप गर्नुस्...",presets:"छिटो छनोट",images:"देवताको फोटोहरू",imageHint:"फोटोहरू छान्नुस्",logo:"विधि चक्र लोगो",logoHint:"लोगो अपलोड गर्नुस्",audio:"भजन/अडियो (सिंक गर्न)",audioHint:"MP3/WAV अपलोड गर्नुस् — काउन्टर अडियोसँग सिंक हुन्छ",audioRemove:"हटाउनुस्",count:"जप संख्या",custom:"अन्य...",japSpeed:"जप गति",imgSpeed:"फोटो गति",colorTheme:"रंग थिम",textMode:"टेक्स्ट प्रकार",textFx:"टेक्स्ट इफेक्ट",fontSize:"अक्षर आकार",showCounter:"काउन्टर देखाउनुस्",showCounterHint:"रिङ र नम्बर देखाउने/लुकाउने",start:"जप सुरु गर्नुस् ✦",enterMantra:"मन्त्र लेख्नुस्...",jap:"जप",mala:"माला",tapHint:"छुनुस्",autoStart:"AUTO-START",autoHint:"खुलेसँगै सुरु",wmPos:"लोगो स्थान",tapTempo:"रिदम छुनुस्",tapHint2:"भजन सुनेर ४-५ पटक छुनुस्",save:"सेभ गर्नुस्",load:"लोड",presetTitle:"सेभ गरिएका सेटिंग्स",noPresets:"कुनै सेभ छैन"},

};

// ── Save / load presets in localStorage ──
function savedPresets(){try{return JSON.parse(localStorage.getItem('vc_presets')||'[]');}catch{return[];}}
function savePreset(){
  const name=prompt("Preset name (e.g. 'Ganesh Reel'):","");
  if(!name||!name.trim())return;
  const p={
    name:name.trim(),ts:Date.now(),
    sMantra,sDeity,sCount,sCustom,sWmPos,sSpeed,sImgInt,sAuto,sThemeId,sCustomClr,
    sTextMode,sFontSize,sShowCounter,sTextFx,sLang

  const all=savedPresets();
  all.unshift(p);
  localStorage.setItem('vc_presets',JSON.stringify(all.slice(0,20)));
  renderSetup();
}
function loadPreset(idx){
  const p=savedPresets()[idx];if(!p)return;
  ({sMantra,sDeity,sCount,sCustom,sWmPos,sSpeed,sImgInt,sAuto,sThemeId,sCustomClr,sTextMode,sFontSize,sShowCounter,sTextFx,sLang}=p);
  renderSetup();
}
function deletePreset(idx){
  if(!confirm("Delete this preset?"))return;
  const all=savedPresets();all.splice(idx,1);
  localStorage.setItem('vc_presets',JSON.stringify(all));
  renderSetup();
}

// ── Tap tempo ──
function tapTempo(){
  const now=Date.now();
  tapTimes.push(now);
  if(tapTimes.length>6)tapTimes.shift();
  if(tapTimes.length>=2){
    const intervals=[];
    for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1]);
    const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;
    const secs=Math.max(2,Math.min(15,Math.round(avg/1000)));
    sSpeed=secs;
    el('speed-lbl').textContent=sSpeed+'s per jap';
    el('tap-btn').style.animation='tap-flash 0.2s ease-out';
    setTimeout(()=>{el('tap-btn').style.animation='';},250);
  }
  // Reset taps after 3s inactivity
  setTimeout(()=>{if(Date.now()-(tapTimes[tapTimes.length-1]||0)>=2900)tapTimes=[];},3000);
}

// ── Audio sync ──
function handleAudioFile(inp){
  const f=inp.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  sAudioSrc=url;sAudioName=f.name;
  el('bhajan-audio').src=url;
  renderSetup();
}
function clearAudio(){
  if(sAudioSrc&&sAudioSrc.startsWith('blob:'))URL.revokeObjectURL(sAudioSrc);
  sAudioSrc=null;sAudioName="";
  el('bhajan-audio').src='';
  renderSetup();
}

// ── Built-in recording ──
async function startBuiltInRec(e){
  if(e)e.stopPropagation();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){
    alert("Built-in recording needs Chrome or Edge on desktop.\n\nOn mobile, use your phone's screen recorder.");
    return;
  }
  try{
    // If audio uploaded, capture audio too via the tab
    recStream=await navigator.mediaDevices.getDisplayMedia({
      video:{frameRate:30},
      audio:sAudioSrc?true:false
    });
    recChunks=[];
    const opts=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?{mimeType:'video/webm;codecs=vp9'}:MediaRecorder.isTypeSupported('video/webm')?{mimeType:'video/webm'}:{};
    mediaRecorder=new MediaRecorder(recStream,opts);
    mediaRecorder.ondataavailable=e=>recChunks.push(e.data);
    mediaRecorder.onstop=()=>{
      const blob=new Blob(recChunks,{type:'video/webm'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='mantra-jap-vidhichakra.webm';a.click();
      URL.revokeObjectURL(url);
      el('rec-banner').style.display='none';
      el('rec-ind').style.display='none';
      recStream=null;mediaRecorder=null;
    };
    recStream.getVideoTracks()[0].onended=()=>stopBuiltInRec();
    mediaRecorder.start(1000);
    el('rec-banner').style.display='flex';
    el('rec-ind').style.display='flex';
    hideControls();
    if(!cRunning)setRunning(true);
  }catch(err){if(err.name!=='NotAllowedError')alert("Could not start recording.");}
}
function stopBuiltInRec(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  if(recStream)recStream.getTracks().forEach(t=>t.stop());
  el('rec-banner').style.display='none';
}

      ${!sAudioSrc?`<button id="tap-btn" onclick="tapTempo()" style="width:100%;margin-top:10px;padding:10px;background:${gC(P,0.08)};border:1px dashed ${gC(P,0.35)};border-radius:10px;color:${P};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
        👆 ${L.tapTempo} — <span style="color:${gC(P,0.5)};font-weight:400">${L.tapHint2}</span>
      </button>`:''}
    </div>

    <!-- AUTO START -->
    <div class="option-row">
      <div>
        <div style="color:${gC(P,0.5)};font-size:10px;letter-spacing:3px">${L.autoStart}</div>
        <div style="color:${gC(P,0.25)};font-size:11px;margin-top:3px">${L.autoHint}</div>
      </div>
      <div class="toggle-track" style="background:${sAuto?gC(P,0.3):gC(P,0.08)};border:1px solid ${sAuto?gC(P,0.6):gC(P,0.2)}" onclick="sAuto=!sAuto;renderSetup()">
        <div class="toggle-thumb" style="left:${sAuto?23:3}px;background:${sAuto?P:'rgba(255,255,255,0.2)'};box-shadow:${sAuto?`0 0 8px ${gC(P,0.8)}`:'none'}"></div>
      </div>
    </div>

    <!-- HOW TO TEST + RECORD -->
    <div style="background:${gC(P,0.06)};border:1px solid ${gC(P,0.18)};border-radius:12px;padding:14px">
      <div style="color:${P};font-size:13px;font-weight:700;margin-bottom:8px">▶️ How to Test & Save Video</div>
      <div style="color:${gC(P,0.6)};font-size:12px;line-height:1.7">
        <strong style="color:${P}">1. Test / Preview:</strong> tap the big button below — the live counter IS your preview. Tap ⚙ to come back & adjust anytime.<br/><br/>
        <strong style="color:${P}">2. Save as video:</strong><br/>
        📱 <strong>Phone (best, gives MP4):</strong> start your phone's screen recorder FIRST, then tap ⏺ REC. Saves MP4 to Photos/Gallery.<br/>
        ${recSupported?`💻 <strong>Desktop:</strong> tap ⏺ REC → pick this tab${sAudioSrc?' → ✅ check "Share audio"':''} → tap red banner to stop → downloads .webm (upload directly to TikTok/Reels/CapCut, they accept it).`:`💻 Desktop recording needs Chrome/Edge.`}
      </div>
    </div>

    <!-- BUTTONS -->
    <div style="display:flex;gap:10px">
      <button onclick="savePreset()" ${!sMantra.trim()?'disabled':''} style="flex:1;background:transparent;color:${sMantra.trim()?P:gC(P,0.2)};border:1px solid ${sMantra.trim()?gC(P,0.4):gC(P,0.1)};border-radius:40px;padding:14px;font-size:14px;font-weight:700;cursor:${sMantra.trim()?'pointer':'not-allowed'};font-family:inherit;letter-spacing:1px">💾 ${L.save}</button>
    </div>

    <button id="go-btn" class="go-btn" onclick="startCounter()"
      style="background:${sMantra.trim()?`linear-gradient(135deg,${dC(P)},${P},${dC(P)})`:'rgba(255,255,255,0.06)'};color:${sMantra.trim()?'#0d0800':'rgba(255,255,255,0.2)'};cursor:${sMantra.trim()?'pointer':'not-allowed'};box-shadow:${sMantra.trim()?`0 0 40px ${gC(P,0.3)}`:'none'}">
      ${sMantra.trim()?L.start:L.enterMantra}
    </button>
  </div>`;
}

function setLang(l){sLang=l;renderSetup();}
function setTheme(id){sThemeId=id;renderSetup();}
function setCustomClr(v){sCustomClr=v;renderSetup();}
function setTextMode(m){sTextMode=m;
  // If current effect doesn't work with build mode, switch to slam
  const fx=fxConfig();
  if(m==='build'&&!fx.okBuild)sTextFx='slam';
  renderSetup();
}
function setTextFx(f){sTextFx=f;renderSetup();}
function setFontSize(s){sFontSize=s;renderSetup();}
function setCount(n){sCount=n;sCustom='';renderSetup();}
function setPreset(m){sMantra=m;el('inp-mantra').value=m;renderSetup();}
function updateGoBtn(){sMantra=el('inp-mantra').value;renderSetup();}
async function addImages(inp){
  const files=Array.from(inp.files);
  const results=await Promise.all(files.map(b64));
  sImages=[...sImages,...results];renderSetup();
}
function removeImg(i){sImages=sImages.filter((_,j)=>j!==i);renderSetup();}
async function setLogo(inp){if(inp.files[0]){sLogoSrc=await b64(inp.files[0]);renderSetup();}}

function startCounter(){
  if(!sMantra.trim())return;
  sDeity=el('inp-deity')?.value||sDeity;
  sMantra=el('inp-mantra')?.value||sMantra;
  cRunning=false;cN=0;cMalas=0;cImgIdx=0;cCountdown=null;
  cWords=sMantra.trim().split(/\s+/).filter(Boolean);
  cWordIdx=0;cShown=1;
  clearAllTimers();
  el('setup').style.display='none';
  el('counter').style.display='flex';
  applyTheme();
  renderMantraText(false);
  drawRing(0,totalN());
  el('counter-num').textContent=0;
  el('counter-denom').textContent='/ '+totalN();
  el('mala-lbl').style.display='none';
  el('ring-wrap').style.display=sShowCounter?'inline-block':'none';
  startImgCycle();
  if(sAuto)setRunning(true);else showControls();
}

function applyTheme(){
  const t=theme(),P=t.p,S=t.s,L=lang(),f=fs();
  el('counter').style.setProperty('--fx-glow',gC(P,0.8));
  el('om-sym').style.cssText=`font-size:${sShowCounter?40:56}px;color:${P};line-height:1;margin-bottom:4px;animation:om-b 4s ease-in-out infinite;filter:drop-shadow(0 0 16px ${gC(P,0.8)});`;
  if(sDeity){el('deity-lbl').style.display='block';el('deity-lbl').textContent=sDeity;el('deity-lbl').style.color=gC(P,0.6);}
  else el('deity-lbl').style.display='none';
  el('ring-wrap').style.animation='ring-float 3.5s ease-in-out infinite';
  el('counter-num').style.cssText=`font-weight:900;line-height:1;font-size:${f.counter}px;color:${P};text-shadow:0 0 28px ${gC(P,0.95)},0 0 60px ${gC(P,0.45)},0 2px 12px rgba(0,0,0,0.95);`;
  el('counter-denom').style.color=gC(P,0.55);
  el('counter-jap').style.color=gC(P,0.3);
  el('counter-jap').textContent=L.jap;
  el('mala-lbl').style.color=S;
  el('mala-lbl').style.textShadow=`0 0 14px ${gC(S,0.7)}`;
  el('tap-hint').style.color=gC(P,0.28);
  el('tap-hint').textContent=L.tapHint;
  el('play-btn').style.borderColor=gC(P,0.4);
  el('reset-btn').style.cssText+=`;border:1px solid ${gC(P,0.22)};color:${gC(P,0.45)};`;
  el('settings-btn').style.cssText+=`;border:1px solid ${gC(P,0.14)};color:${gC(P,0.3)};`;
  el('gradient').style.background=sImages.length
    ?'linear-gradient(to bottom,rgba(6,3,0,0.05) 0%,rgba(6,3,0,0.06) 40%,rgba(6,3,0,0.7) 62%,rgba(6,3,0,0.97) 100%)'
    :'linear-gradient(to bottom,rgba(6,3,0,0.8) 0%,rgba(6,3,0,0.85) 100%)';
  el('mantra-wrap').style.marginBottom=sShowCounter?'14px':'24px';
  el('mantra-wrap').style.marginTop=sShowCounter?'0':'10px';
  renderWatermark(P);
  renderImgDots();
  if(sImages.length>0){
    imgSlotA=true;
    el('bg-img-a').src=sImages[0];
    el('bg-img-a').style.opacity='0.82';
    el('bg-img-b').style.opacity='0';
  } else {
    el('bg-img-a').style.opacity='0';
    el('bg-img-b').style.opacity='0';
  }
  // Audio indicator
  if(sAudioSrc){el('audio-ind').style.display='flex';}else{el('audio-ind').style.display='none';}
}

function renderWatermark(P){
  const wm=el('watermark');
  const posMap={tl:{top:'14px',left:'14px'},tr:{top:'14px',right:'14px'},bl:{bottom:'85px',left:'14px'},br:{bottom:'85px',right:'14px'}};
  const pos=posMap[sWmPos]||posMap.tr;
  wm.style.cssText=`position:absolute;z-index:10;pointer-events:none;display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(0,0,0,0.42);border-radius:20px;backdrop-filter:blur(8px);border:1px solid ${gC(P,0.3)};${Object.entries(pos).map(([k,v])=>k+':'+v).join(';')}`;
  wm.innerHTML=sLogoSrc
    ?`<img src="${sLogoSrc}" style="height:26px;width:auto;max-width:90px;object-fit:contain"/>`
    :`<span style="font-size:14px">🔯</span><div style="line-height:1"><div style="color:${P};font-size:11px;font-weight:700;letter-spacing:1px;font-family:inherit">विधि चक्र</div><div style="color:${gC(P,0.55)};font-size:8px;letter-spacing:2px;font-family:monospace">VIDHI CHAKRA</div></div>`;
}

function renderImgDots(){
  const P=theme().p,dots=el('img-dots');
  dots.innerHTML='';
  if(sImages.length>1){
    sImages.forEach((_,i)=>{
      const d=document.createElement('div');
      d.className='img-dot';
      d.style.width=(i===cImgIdx?20:6)+'px';
      d.style.background=i===cImgIdx?P:gC(P,0.3);
      dots.appendChild(d);
    });
  }
}

function startImgCycle(){
  clearInterval(imgTimerA);
  if(sImages.length<=1)return;
  imgTimerA=setInterval(()=>{
    const nextIdx=(cImgIdx+1)%sImages.length;
    if(imgSlotA){
      el('bg-img-b').src=sImages[nextIdx];
      el('bg-img-b').style.opacity='0.82';
      setTimeout(()=>el('bg-img-a').style.opacity='0',50);
    } else {
      el('bg-img-a').src=sImages[nextIdx];
      el('bg-img-a').style.opacity='0.82';
      setTimeout(()=>el('bg-img-b').style.opacity='0',50);
    }
    imgSlotA=!imgSlotA;
    cImgIdx=nextIdx;
    renderImgDots();
  },sImgInt*1000);
}

function renderMantraText(animate){
  const P=theme().p,S=theme().s,f=fs(),wrap=el('mantra-wrap');
  const fx=fxConfig();
  wrap.style.setProperty('--fx-glow',gC(P,0.9));
  const shadow=`0 2px 16px rgba(0,0,0,0.95),0 0 30px ${gC(P,0.35)}`;

  if(sTextMode==='full'){
    wrap.innerHTML=`<div style="font-size:${f.mantra}px;color:${P};line-height:1.6;letter-spacing:1px;font-weight:800;text-align:center;padding:0 10px;text-shadow:${shadow};animation:${animate?fx.css:'glow-loop 3s ease-in-out infinite'};--fx-glow:${gC(P,0.7)}">${sMantra}</div>`;
  } else if(sTextMode==='word'){
    const w=cWords[cWordIdx]||cWords[0]||'';
    const wLen=w.length;
    const scaledSize=wLen>6?f.mantra*1.2:wLen>4?f.mantra*1.35:f.mantra*1.55;
    wrap.innerHTML=`<div style="font-size:${scaledSize}px;font-weight:900;color:${P};line-height:1.2;letter-spacing:2px;text-shadow:0 0 40px ${gC(P,0.9)},0 0 80px ${gC(P,0.5)},0 3px 20px rgba(0,0,0,0.95);text-align:center;width:100%;padding:0 10px;word-break:break-word;--fx-glow:${gC(P,0.9)};animation:${animate?fx.css:''}">${w}</div>`;
  } else if(sTextMode==='build'){
    const visible=cWords.slice(0,cShown);
    const baseSz=cWords.length>6?f.mantra*0.85:f.mantra;
    const safeFx=fx.okBuild?fx.css:TEXT_FX[0].css;
    wrap.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%;padding:0 10px">`+
      visible.map((w,i)=>{
        const isNew=i===cShown-1;
        return `<span style="font-size:${isNew?baseSz*1.35:baseSz*0.9}px;font-weight:${isNew?900:700};color:${isNew?P:gC(P,0.42)};letter-spacing:1px;text-shadow:${isNew?`0 0 35px ${gC(P,0.9)},0 0 70px ${gC(P,0.5)},0 3px 18px rgba(0,0,0,0.95)`:`0 2px 10px rgba(0,0,0,0.8)`};transition:all 0.35s;--fx-glow:${gC(P,0.9)};${isNew&&animate?'animation:'+safeFx:''}">${w}</span>`;
      }).join('')+'</div>';
  }
}

function drawRing(current,total){
  const P=theme().p,S=theme().s;
  const R=78,ORB=106,DS=5.5,SZ=(ORB+DS+10)*2,C=SZ/2;
  const circ=2*Math.PI*R,off=circ-(current/total)*circ;
  const rsvg=el('ring-svg');
  rsvg.setAttribute('width',SZ);rsvg.setAttribute('height',SZ);
  rsvg.setAttribute('viewBox',`0 0 ${SZ} ${SZ}`);
  const dots=[...Array(total)].map((_,i)=>{
    const a=((i/total)*360-90)*(Math.PI/180),lit=i<current;
    return `<circle cx="${C+ORB*Math.cos(a)}" cy="${C+ORB*Math.sin(a)}" r="${lit?DS:DS*0.48}" fill="${lit?P:gC(P,0.22)}" ${lit?'filter="url(#dg)"':''} style="transition:r 0.3s,fill 0.3s"/>`;
  }).join('');
  rsvg.innerHTML=`<defs>
    <linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${P}"/><stop offset="50%" stop-color="${S}"/><stop offset="100%" stop-color="${P}"/></linearGradient>
    <filter id="ag" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dg" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="${gC(P,0.18)}" stroke-width="10"/>
  <circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="url(#rG)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 ${C} ${C})" filter="url(#ag)" style="transition:stroke-dashoffset 0.55s cubic-bezier(0.4,0,0.2,1)"/>
  ${dots}`;
  el('ring-center').style.cssText=`position:absolute;inset:0;width:${SZ}px;height:${SZ}px;display:flex;flex-direction:column;align-items:center;justify-content:center;`;
}

function tickJap(){
  cN++;
  if(cN>=totalN()){cN=0;cMalas++;spawnBurst();}
  const num=el('counter-num');
  num.style.animation='none';void num.offsetHeight;
  num.style.animation='num-pop 0.42s cubic-bezier(0.34,1.56,0.64,1)';
  num.textContent=cN;
  el('counter-denom').textContent='/ '+totalN();
  if(cMalas>0){el('mala-lbl').style.display='block';el('mala-lbl').textContent=lang().mala+' × '+cMalas+' ✦';}
  if(sShowCounter)drawRing(cN,totalN());
  cWordIdx=0;cShown=1;
  renderMantraText(true);
}

function setRunning(val){
  cRunning=val;
  clearInterval(japTimer);clearInterval(wordTimer);clearInterval(buildTimer);clearInterval(audioSyncTimer);
  const audio=el('bhajan-audio');

  if(val){
    if(sAudioSrc){
      // AUDIO-DRIVEN MODE: counter follows audio.currentTime
      audio.currentTime=0;
      audio.play().catch(()=>alert("Audio playback failed. Tap the screen first then try again."));
      // sSpeed acts as the rhythm — audio plays continuously
      // Counter ticks at sSpeed intervals but they all originate from audio playback time so they don't drift
      let lastTick=0;
      audioSyncTimer=setInterval(()=>{
        if(audio.paused)return;
        const t=audio.currentTime;
        const elapsedSinceTick=t-lastTick;
        if(elapsedSinceTick>=sSpeed){
          lastTick=t;
          tickJap();
        }
      },100); // Check every 100ms — far more precise than setInterval drift
      // Word-by-word and build-up: derive from audio time too
      if(sTextMode==='word'&&cWords.length>0){
        const wordDuration=sSpeed/cWords.length;
        wordTimer=setInterval(()=>{
          if(audio.paused)return;
          const t=audio.currentTime;
          const inJap=t-lastTick;
          const idx=Math.min(cWords.length-1,Math.floor(inJap/wordDuration));
          if(idx!==cWordIdx){cWordIdx=idx;renderMantraText(true);}
        },80);
      }
      if(sTextMode==='build'&&cWords.length>0){
        const wordDuration=sSpeed/(cWords.length+1);
        buildTimer=setInterval(()=>{
          if(audio.paused)return;
          const t=audio.currentTime;
          const inJap=t-lastTick;
          const target=Math.max(1,Math.min(cWords.length,Math.floor(inJap/wordDuration)+1));
          if(target!==cShown){cShown=target;renderMantraText(true);}
        },80);
      }
    } else {
      // FREE TIMER MODE (no audio)
      japTimer=setInterval(tickJap,sSpeed*1000);
      if(sTextMode==='word'&&cWords.length>0){
        const interval=Math.max(300,(sSpeed*1000)/cWords.length);
        wordTimer=setInterval(()=>{cWordIdx=(cWordIdx+1)%cWords.length;renderMantraText(true);},interval);
      }
      if(sTextMode==='build'&&cWords.length>0){
        const interval=Math.max(300,(sSpeed*1000)/(cWords.length+1));
        buildTimer=setInterval(()=>{cShown=cShown>=cWords.length?1:cShown+1;renderMantraText(true);},interval);
      }
    }
    spawnPetals();
    el('rec-ind').style.display=mediaRecorder?'flex':'none';
    el('tap-hint').style.display='none';
  } else {
    audio.pause();
    stopPetals();
    el('rec-ind').style.display='none';
  }
  updatePlayBtn();
}

function updatePlayBtn(){
  const P=theme().p,S=theme().s,btn=el('play-btn');
  btn.textContent=cRunning?'⏸':'▶';
  btn.style.background=cRunning?gC(S,0.14):gC(P,0.14);
  btn.style.borderColor=cRunning?gC(S,0.4):gC(P,0.4);
  btn.style.color=cRunning?S:P;
}

el('counter').addEventListener('click',()=>{
  if(cCountdown!==null)return;
  setRunning(!cRunning);showControls();
});
el('play-btn').addEventListener('click',e=>{e.stopPropagation();setRunning(!cRunning);showControls();});

function showControls(){
  el('controls').style.display='flex';
  el('controls').style.animation='ctrl-in 0.3s ease-out';
  el('tap-hint').style.display='none';
  clearTimeout(ctrlTimer);
  ctrlTimer=setTimeout(hideControls,4000);
}
function hideControls(){el('controls').style.display='none';if(!cRunning)el('tap-hint').style.display='block';}

function resetCounter(e){
  e.stopPropagation();clearAllTimers();
  cN=0;cMalas=0;cWordIdx=0;cShown=1;
  el('bhajan-audio').currentTime=0;
  setRunning(false);
  const n=totalN();
  if(sShowCounter)drawRing(0,n);
  el('counter-num').textContent=0;
  el('counter-denom').textContent='/ '+n;
  el('mala-lbl').style.display='none';
  renderMantraText(false);showControls();
}

function goBack(e){
  e.stopPropagation();
  stopBuiltInRec();clearAllTimers();setRunning(false);
  el('counter').style.display='none';
  el('setup').style.display='flex';
  renderSetup();
}

let petalIv=null,petalEls=[];
function spawnPetals(){
  stopPetals();
  const P=theme().p,S=theme().s;
  const colors=[`rgba(255,80,80,0.62)`,`rgba(255,165,0,0.6)`,gC(P,0.55),gC(S,0.5)];
  petalIv=setInterval(()=>{
    const p=document.createElement('div');
    p.className='petal';
    const i=Math.floor(Math.random()*7),w=7+(i%3)*2,h=12+(i%3)*3;
    p.style.cssText=`width:${w}px;height:${h}px;left:${Math.random()*90+5}%;background:${colors[i%4]};animation:petal-fall ${2.6+i*0.65}s linear forwards`;
    el('petals').appendChild(p);petalEls.push(p);
    setTimeout(()=>{p.remove();petalEls=petalEls.filter(x=>x!==p);},(2.6+i*0.65)*1000+100);
  },700);
}
function stopPetals(){clearInterval(petalIv);petalEls.forEach(p=>p.remove());petalEls=[];}

function spawnBurst(){
  const P=theme().p,d=document.createElement('div');
  d.style.cssText=`position:absolute;top:50%;left:50%;width:280px;height:280px;border-radius:50%;border:2.5px solid ${P};box-shadow:0 0 30px ${gC(P,0.7)};animation:burst-ring 0.8s ease-out forwards;pointer-events:none;z-index:6`;
  el('counter').appendChild(d);setTimeout(()=>d.remove(),900);
}

function clearAllTimers(){
  clearInterval(japTimer);clearInterval(imgTimerA);clearInterval(wordTimer);
  clearInterval(buildTimer);clearInterval(cdTimer);clearInterval(audioSyncTimer);
  clearTimeout(ctrlTimer);
  japTimer=imgTimerA=wordTimer=buildTimer=cdTimer=audioSyncTimer=null;
}

renderSetup();
</script>
